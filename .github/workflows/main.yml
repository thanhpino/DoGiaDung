name: CI Check (Build & Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Kiểm tra Frontend
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Try Build Frontend
        run: npm run build

  # Job 2: Kiểm tra Backend (với MySQL)
  backend-check:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: dogiadung_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Setup database tables
        run: |
          mysql -h 127.0.0.1 -u root -ptestpassword dogiadung_db <<EOF
          CREATE TABLE IF NOT EXISTS users (
            id INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(100),
            email VARCHAR(100) UNIQUE,
            password VARCHAR(255),
            phone VARCHAR(20),
            address VARCHAR(255),
            avatar VARCHAR(255),
            role ENUM('customer','admin') DEFAULT 'customer',
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS products (
            id INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(200),
            price DECIMAL(12,0),
            old_price DECIMAL(12,0),
            category VARCHAR(50),
            image_url TEXT,
            description TEXT,
            rating DECIMAL(2,1) DEFAULT 5.0,
            review_count INT DEFAULT 0,
            is_deleted TINYINT DEFAULT 0,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS orders (
            id INT AUTO_INCREMENT PRIMARY KEY,
            user_id INT,
            customer_name VARCHAR(100),
            customer_phone VARCHAR(20),
            customer_address VARCHAR(255),
            total_amount DECIMAL(12,0),
            payment_method VARCHAR(50),
            note TEXT,
            status VARCHAR(50) DEFAULT 'Chờ xác nhận',
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS order_items (
            id INT AUTO_INCREMENT PRIMARY KEY,
            order_id INT,
            product_id INT,
            quantity INT,
            price DECIMAL(12,0)
          );
          CREATE TABLE IF NOT EXISTS reviews (
            id INT AUTO_INCREMENT PRIMARY KEY,
            user_id INT,
            product_id INT,
            rating INT,
            comment TEXT,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          INSERT INTO products (name, price, category, image_url, description) VALUES
          ('Nồi cơm điện tử Toshiba', 1290000, 'Kitchen', '/images/noicom.jpg', 'Nồi cơm 1.8L'),
          ('Quạt điều hoà Sunhouse', 2990000, 'Cooling', '/images/quat.jpg', 'Quạt điều hoà 30L'),
          ('Robot hút bụi Xiaomi', 4500000, 'SmartHome', '/images/robot.jpg', 'Robot thông minh');

          INSERT INTO users (name, email, password, role) VALUES
          ('Admin Test', 'tt3145539@gmail.com', '\$2b\$10\$YourHashedPasswordHere', 'admin');
          EOF

      - name: Install ChatBot Service Dependencies
        working-directory: ./chatbot-service
        run: npm install

      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm install

      - name: Run Backend Tests
        working-directory: ./server
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: testpassword
          DB_NAME: dogiadung_db
          DB_PORT: 3306
          JWT_SECRET: test-secret-key-for-ci
          GEMINI_API_KEY: test-key
        run: |
          node migrations/run_all_migrations.js
          npx jest --forceExit --verbose
