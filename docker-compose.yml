services:
  # 1. DATABASE
  mysqldb:
    image: mysql:8.0
    container_name: tmt_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: dogiadung_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. BACKEND (Main Server)
  server:
    build: ./server
    container_name: tmt_server
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - ./server/.env
    environment:
      - DB_HOST=mysqldb
      - CHATBOT_SERVICE_URL=http://chatbot:8082
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mysqldb
      - chatbot
      - redis

  # 3. CHATBOT MICROSERVICE (Gemini AI)
  chatbot:
    build: ./chatbot-service
    container_name: tmt_chatbot
    restart: always
    ports:
      - "8082:8082"
    env_file:
      - ./chatbot-service/.env
    environment:
      - DB_HOST=mysqldb
    depends_on:
      - mysqldb

  # 4. FRONTEND
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: tmt_client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8081
    depends_on:
      - server

  # 5. REDIS
  redis:
    image: redis:7-alpine
    container_name: tmt_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mysql_data:
  redis_data:
